<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NppIDE 0.9.0</title>
  <style>
    :root {
      --bg: #0f111a;
      --panel: #171a26;
      --panel2: #1d2233;
      --text: #e7eaf3;
      --muted: #8e96b5;
      --accent: #7aa2f7;
      --accent2: #9ece6a;
      --warn: #f7768e;
      --border: #2a3147;
      --editor: #0b0d14;
      --linebg: #10131c;
      --shadow: rgba(0, 0, 0, 0.35);
      --radius: 12px;
      --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --ui: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: row;
    }

    .menu-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      width: 46px;
      height: 46px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 10px 30px var(--shadow);
      font-size: 20px;
    }

    .sidebar {
      width: 320px;
      height: 100vh;
      background: linear-gradient(180deg, var(--panel), #121522);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(0);
      transition: transform 0.25s ease;
      z-index: 10;
    }

    .sidebar.closed {
      transform: translateX(-100%);
    }

    .sidebar-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
      margin-left: 64px;
    }

    .project-title {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .project-title input {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      padding: 6px 8px;
      border-radius: 8px;
      outline: none;
    }

    .project-title input:focus {
      border-color: var(--border);
      background: rgba(255,255,255,0.03);
    }

    .sidebar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn:hover {
      border-color: var(--accent);
    }

    .tree {
      padding: 12px;
      overflow: auto;
      flex: 1;
    }

    .tree-item {
      user-select: none;
      border-radius: 10px;
      margin-bottom: 4px;
    }

    .tree-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .tree-row:hover {
      background: rgba(255,255,255,0.05);
    }

    .tree-row.active {
      background: rgba(122,162,247,0.18);
      outline: 1px solid rgba(122,162,247,0.35);
    }

    .tree-row.folder > .arrow {
      width: 12px;
      display: inline-block;
      color: var(--muted);
    }

    .tree-row.file > .arrow {
      width: 12px;
      display: inline-block;
      color: transparent;
    }

    .children {
      margin-left: 18px;
      border-left: 1px dashed rgba(255,255,255,0.08);
      padding-left: 10px;
      display: none;
    }

    .tree-item.open > .children {
      display: block;
    }

    .icon {
      width: 18px;
      text-align: center;
    }

    .name {
      flex: 1;
      font-family: var(--ui);
      font-size: 14px;
    }

    .main {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      height: 62px;
      padding: 12px 18px 12px 76px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 26, 0.85);
      backdrop-filter: blur(10px);
    }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 16px;
      align-items: center;
      white-space: nowrap;
    }

    .editor-shell {
      flex: 1;
      display: flex;
      min-height: 0;
      background: var(--editor);
    }

    .line-numbers {
      width: 58px;
      background: var(--linebg);
      color: #5f6785;
      padding: 18px 10px;
      text-align: right;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
      border-right: 1px solid var(--border);
      user-select: none;
      white-space: pre;
    }

    .editor-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .block-guides {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .guide-line {
      position: absolute;
      width: 2px;
      border-radius: 999px;
      background: rgba(122, 162, 247, 0.35);
      box-shadow: 0 0 0 1px rgba(122, 162, 247, 0.08);
    }

    .highlight, .editor {
      position: absolute;
      inset: 0;
      margin: 0;
      padding: 18px 18px 18px 18px;
      border: 0;
      outline: none;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      tab-size: 2;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow: auto;
      scrollbar-width: thin;
    }

    .highlight {
      pointer-events: none;
      color: var(--text);
      background: transparent;
      z-index: 2;
    }

    .editor {
      resize: none;
      color: transparent;
      background: transparent;
      caret-color: var(--text);
      z-index: 3;
    }

    .editor::selection {
      background: rgba(122,162,247,0.25);
    }

    .token-keyword { color: #c678dd; font-weight: 600; }
    .token-builtin { color: #61afef; }
    .token-number { color: #d19a66; }
    .token-string { color: #98c379; }
    .token-comment { color: #7f8c98; font-style: italic; }
    .token-operator { color: #abb2bf; }
    .token-punc { color: #abb2bf; }

    .footer {
      height: 30px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      background: #0d1018;
    }

    .footer strong {
      color: var(--text);
      font-weight: 600;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      display: none;
      z-index: 5;
    }

    .overlay.show {
      display: block;
    }

    @media (max-width: 800px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 86vw;
        max-width: 360px;
      }
      .topbar {
        padding-left: 76px;
      }
    }
  </style>
</head>
<body>
  <button class="menu-btn" id="menuBtn" aria-label="Toggle project menu">☰</button>
  <div class="overlay" id="overlay"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="project-title">
          <input id="projectName" type="text" value="My Study Project" />
        </div>
        <div class="sidebar-actions">
          <button class="btn" id="newFolderBtn">New Folder</button>
          <button class="btn" id="newFileBtn">New File</button>
          <button class="btn" id="saveBtn">Save</button>
          <button class="btn" id="loadBtn">Load</button>
        </div>
      </div>
      <div class="tree" id="tree"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="btn" id="renameBtn">Rename File</button>
        <button class="btn" id="deleteBtn">Delete File</button>
        <div class="status">
          <span id="currentFileLabel">No file open</span>
          <span id="saveState">Saved locally</span>
        </div>
      </div>

      <div class="editor-shell">
        <div class="line-numbers" id="lineNumbers">1</div>
        <div class="editor-wrap">
          <div class="block-guides" id="blockGuides"></div>
          <pre class="highlight" id="highlight"></pre>
          <textarea class="editor" id="editor" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off"></textarea>
        </div>
      </div>

      <div class="footer">
        <div id="infoLeft">Ready</div>
        <div id="infoRight">Text-only IDE • No code execution</div>
      </div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "v0.9.0-nppide";
    const INDENT_SIZE = 4;


    const KEYWORDS = [
      "if", "else", "inherit", "break", "continue",
      "for", "while", "return", "func", "class", "call", "load",
      "attempt", "catch", "delete", "throw", "import", "from", "open",
      "and", "or", "not", "in", "as", "is", "sync", "desync",
      "True", "False", "None", "private", "public", "get",
    ];

    const BUILTINS = ["num", "input", "eval", "exec", "length", "sort", "min", "mean", "max", "median", "mode", "sum", "range", "call", "reverse", "type", "format", "zip", "dict", "map"];

    const state = loadState() || createDefaultState();

    const els = {
      menuBtn: document.getElementById("menuBtn"),
      overlay: document.getElementById("overlay"),
      sidebar: document.getElementById("sidebar"),
      tree: document.getElementById("tree"),
      projectName: document.getElementById("projectName"),
      newFolderBtn: document.getElementById("newFolderBtn"),
      newFileBtn: document.getElementById("newFileBtn"),
      saveBtn: document.getElementById("saveBtn"),
      loadBtn: document.getElementById("loadBtn"),
      renameBtn: document.getElementById("renameBtn"),
      deleteBtn: document.getElementById("deleteBtn"),
      editor: document.getElementById("editor"),
      highlight: document.getElementById("highlight"),
      blockGuides: document.getElementById("blockGuides"),
      lineNumbers: document.getElementById("lineNumbers"),
      currentFileLabel: document.getElementById("currentFileLabel"),
      saveState: document.getElementById("saveState"),
      infoLeft: document.getElementById("infoLeft"),
      infoRight: document.getElementById("infoRight")
    };

    let activeFileId = state.activeFileId || null;
    let activeFolderId = state.activeFolderId || state.project.rootFolders[0]?.id || null;
    let selectedNodeId = activeFileId || activeFolderId;
    let metrics = {
      charWidth: 8,
      lineHeight: 24,
      paddingLeft: 18,
      paddingTop: 18
    };

    els.projectName.value = state.project.name;

    function uid() {
      return "id_" + Math.random().toString(36).slice(2, 10) + "_" + Date.now().toString(36);
    }

    function createDefaultState() {
      const mainFileId = uid();
      const srcFolderId = uid();

      return {
        project: {
          name: "My Project",
          rootFolders: [
            {
              id: srcFolderId,
              type: "folder",
              name: "src",
              open: true,
              folders: [],
              files: [
                {
                  id: mainFileId,
                  type: "file",
                  name: "main.npp",
                  content: `// put your program here`
                }
              ]
            }
          ]
        },
        activeFileId: mainFileId,
        activeFolderId: srcFolderId
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function persistState() {
      state.activeFileId = activeFileId;
      state.activeFolderId = activeFolderId;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      els.saveState.textContent = "Saved locally";
      setTimeout(() => {
        els.saveState.textContent = "Auto-saved";
      }, 700);
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeRegExp(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function buildTokenRegex() {
      const kw = KEYWORDS.map(escapeRegExp).join("|");
      const bi = BUILTINS.map(escapeRegExp).join("|");
      return new RegExp(
        [
          "(\\/\\/.*?$)",
          "(\\/\\*[\\s\\S]*?\\*\\/)",
          `("([^"\\\\]|\\\\.)*"|'([^'\\\\]|\\\\.)*'|\\\`([^\\\`\\\\]|\\\\.)*\\\`)`,
          `\\b(?:${kw})\\b`,
          `\\b(?:${bi})\\b`,
          "\\b\\d+(?:\\.\\d+)?\\b",
          "[+\\-*/%=!<>&|^~?:]+",
          "[{}()[\\],.;]"
        ].join("|"),
        "gm"
      );
    }

    const TOKEN_RE = buildTokenRegex();

    function highlightCode(code) {
      return escapeHtml(code).replace(TOKEN_RE, (match) => {
        if (match.startsWith("//")) return `<span class="token-comment">${escapeHtml(match)}</span>`;
        if (match.startsWith("/*")) return `<span class="token-comment">${escapeHtml(match)}</span>`;
        if (/^["'`]/.test(match)) return `<span class="token-string">${escapeHtml(match)}</span>`;
        if (KEYWORDS.includes(match)) return `<span class="token-keyword">${match}</span>`;
        if (BUILTINS.includes(match)) return `<span class="token-builtin">${match}</span>`;
        if (/^\d/.test(match)) return `<span class="token-number">${match}</span>`;
        if (/^[+\-*/%=!<>&|^~?:]+$/.test(match)) return `<span class="token-operator">${match}</span>`;
        if (/^[{}()[\],.;]$/.test(match)) return `<span class="token-punc">${match}</span>`;
        return match;
      });
    }

    function findFolderById(id, folders = state.project.rootFolders) {
      for (const folder of folders) {
        if (folder.id === id) return folder;
        const foundInChildFolder = findFolderById(id, folder.folders || []);
        if (foundInChildFolder) return foundInChildFolder;
      }
      return null;
    }

    function findFileById(id, folders = state.project.rootFolders) {
      for (const folder of folders) {
        for (const file of folder.files || []) {
          if (file.id === id) return file;
        }
        const foundInChildFolder = findFileById(id, folder.folders || []);
        if (foundInChildFolder) return foundInChildFolder;
      }
      return null;
    }

    function findParentOfFile(id, folders = state.project.rootFolders) {
      for (const folder of folders) {
        for (const file of folder.files || []) {
          if (file.id === id) return folder;
        }
        const found = findParentOfFile(id, folder.folders || []);
        if (found) return found;
      }
      return null;
    }

    function leadingIndentColumns(line) {
      let cols = 0;
      for (const ch of line) {
        if (ch === " ") cols += 1;
        else if (ch === "\t") cols += INDENT_SIZE - (cols % INDENT_SIZE);
        else break;
      }
      return cols;
    }

    function measureMetrics() {
      const cs = getComputedStyle(els.editor);
      metrics.paddingLeft = parseFloat(cs.paddingLeft) || 18;
      metrics.paddingTop = parseFloat(cs.paddingTop) || 18;
      const lineHeight = parseFloat(cs.lineHeight);
      if (!Number.isNaN(lineHeight)) metrics.lineHeight = lineHeight;

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      ctx.font = cs.font;
      metrics.charWidth = ctx.measureText("0").width || 8;
    }

    function analyzeBlockGuides(text) {
      const lines = text.split("\n");
      const outsideLines = [];
      let inString = null;
      let escape = false;
      let inBlockComment = false;

      for (const line of lines) {
        let out = "";
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          const n = line[i + 1];

          if (inBlockComment) {
            if (c === "*" && n === "/") {
              inBlockComment = false;
              i++;
            }
            continue;
          }

          if (inString) {
            if (escape) {
              escape = false;
              continue;
            }
            if (c === "\\") {
              escape = true;
              continue;
            }
            if (c === inString) {
              inString = null;
              continue;
            }
            continue;
          }

          if (c === "/" && n === "/") break;
          if (c === "/" && n === "*") {
            inBlockComment = true;
            i++;
            continue;
          }

          if (c === '"' || c === "'" || c === "`") {
            inString = c;
            continue;
          }

          out += c;
        }
        outsideLines.push(out);
      }

      const guides = [];
      const stack = [];

      for (let lineIndex = 0; lineIndex < outsideLines.length; lineIndex++) {
        const line = outsideLines[lineIndex];
        const trimmed = line.trimEnd();
        const openIdx = trimmed.lastIndexOf("{");
        const qualifiesOpen =
          openIdx !== -1 &&
          trimmed.slice(openIdx + 1).trim() === "" &&
          trimmed.lastIndexOf("}") < openIdx;

        for (let col = 0; col < line.length; col++) {
          const ch = line[col];

          if (ch === "{" && qualifiesOpen && col === openIdx) {
            stack.push({ line: lineIndex });
          } else if (ch === "}" && stack.length) {
            const open = stack.pop();
            guides.push({ start: open.line, end: lineIndex });
          }
        }
      }

      return guides;
    }

    function renderBlockGuides() {
      measureMetrics();
      const guides = analyzeBlockGuides(els.editor.value);
      const frag = document.createDocumentFragment();

      for (const guide of guides) {
        const line = findOpeningLineText(els.editor.value, guide.start);
        const xCols = leadingIndentColumns(line);
        const left = metrics.paddingLeft + xCols * metrics.charWidth - els.editor.scrollLeft;
        const top = metrics.paddingTop + guide.start * metrics.lineHeight - els.editor.scrollTop;
        const height = Math.max(metrics.lineHeight, (guide.end - guide.start + 1) * metrics.lineHeight);

        const div = document.createElement("div");
        div.className = "guide-line";
        div.style.left = `${left}px`;
        div.style.top = `${top}px`;
        div.style.height = `${height}px`;
        frag.appendChild(div);
      }

      els.blockGuides.innerHTML = "";
      els.blockGuides.appendChild(frag);
    }

    function findOpeningLineText(code, lineNumber) {
      const lines = code.split("\n");
      return lines[lineNumber] || "";
    }

    function updateStatus() {
      const file = activeFileId ? findFileById(activeFileId) : null;
      const text = els.editor.value;
      const lines = text ? text.split("\n").length : 1;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      els.currentFileLabel.textContent = file ? `Editing: ${file.name}` : "No file open";
      els.infoLeft.textContent = `${lines} line${lines === 1 ? "" : "s"} • ${words} word${words === 1 ? "" : "s"}`;
    }

    function updateEditorView() {
      const value = els.editor.value;
      els.highlight.innerHTML = highlightCode(value) + "<br>";
      els.lineNumbers.textContent = Array.from(
        { length: Math.max(1, value.split("\n").length) },
        (_, i) => i + 1
      ).join("\n");
      updateStatus();
      renderBlockGuides();
    }

    function syncScroll() {
      els.highlight.scrollTop = els.editor.scrollTop;
      els.highlight.scrollLeft = els.editor.scrollLeft;
      els.lineNumbers.scrollTop = els.editor.scrollTop;
      renderBlockGuides();
    }

    function renderTree() {
      const renderFolder = (folder) => {
        const isActive = selectedNodeId === folder.id ? "active" : "";
        const openClass = folder.open ? "open" : "";
        const childrenHtml = [
          ...(folder.folders || []).map(f => renderFolder(f)),
          ...(folder.files || []).map(file => renderFile(file))
        ].join("");

        return `
          <div class="tree-item ${openClass}" data-id="${folder.id}" data-type="folder">
            <div class="tree-row folder ${isActive}" data-action="toggle-folder" data-id="${folder.id}">
              <span class="arrow">${folder.open ? "▾" : "▸"}</span>
              <span class="icon">📁</span>
              <span class="name">${escapeHtml(folder.name)}</span>
            </div>
            <div class="children">${childrenHtml}</div>
          </div>
        `;
      };

      const renderFile = (file) => {
        const isActive = selectedNodeId === file.id ? "active" : "";
        return `
          <div class="tree-item" data-id="${file.id}" data-type="file">
            <div class="tree-row file ${isActive}" data-action="open-file" data-id="${file.id}">
              <span class="arrow">•</span>
              <span class="icon">📄</span>
              <span class="name">${escapeHtml(file.name)}</span>
            </div>
          </div>
        `;
      };

      els.tree.innerHTML = state.project.rootFolders.map(folder => renderFolder(folder)).join("");
    }

    function openFile(fileId) {
      const file = findFileById(fileId);
      if (!file) return;
      activeFileId = fileId;
      selectedNodeId = fileId;
      els.editor.value = file.content || "";
      updateEditorView();
      renderTree();
    }

    function saveCurrentFile() {
      if (!activeFileId) return;
      const file = findFileById(activeFileId);
      if (!file) return;
      file.content = els.editor.value;
      persistState();
      renderTree();
      updateStatus();
    }

    function createFolder() {
      const name = prompt("Folder name:", "new-folder");
      if (!name) return;

      const newFolder = {
        id: uid(),
        type: "folder",
        name,
        open: true,
        folders: [],
        files: []
      };

      const target = selectedNodeId && findFolderById(selectedNodeId)
        ? findFolderById(selectedNodeId)
        : activeFolderId && findFolderById(activeFolderId)
          ? findFolderById(activeFolderId)
          : state.project.rootFolders[0];

      if (target) {
        target.folders = target.folders || [];
        target.folders.push(newFolder);
        target.open = true;
        activeFolderId = target.id;
      } else {
        state.project.rootFolders.push(newFolder);
      }

      selectedNodeId = newFolder.id;
      persistState();
      renderTree();
    }

    function createFile() {
      const name = prompt("File name:", "new-file.txt");
      if (!name) return;

      const newFile = {
        id: uid(),
        type: "file",
        name,
        content: ""
      };

      const target = selectedNodeId && findFolderById(selectedNodeId)
        ? findFolderById(selectedNodeId)
        : activeFolderId && findFolderById(activeFolderId)
          ? findFolderById(activeFolderId)
          : state.project.rootFolders[0];

      if (!target) {
        alert("No folder found to place the file in.");
        return;
      }

      target.files = target.files || [];
      target.files.push(newFile);
      target.open = true;
      activeFolderId = target.id;
      activeFileId = newFile.id;
      selectedNodeId = newFile.id;
      els.editor.value = "";
      updateEditorView();
      persistState();
      renderTree();
    }

    function renameActiveFile() {
      if (!activeFileId) return alert("Open a file first.");
      const file = findFileById(activeFileId);
      if (!file) return;
      const newName = prompt("Rename file:", file.name);
      if (!newName) return;
      file.name = newName;
      persistState();
      renderTree();
      updateStatus();
    }

    function deleteActiveFile() {
      if (!activeFileId) return alert("Open a file first.");
      const file = findFileById(activeFileId);
      if (!file) return;

      if (!confirm(`Delete "${file.name}"?`)) return;

      const parent = findParentOfFile(activeFileId);
      if (!parent) return;

      parent.files = (parent.files || []).filter(f => f.id !== activeFileId);
      activeFileId = null;
      selectedNodeId = parent.id;
      els.editor.value = "";
      updateEditorView();
      persistState();
      renderTree();
    }

    function loadProjectFromStorage() {
      const loaded = loadState();
      if (!loaded) {
        alert("No saved project found yet.");
        return;
      }
      Object.assign(state, loaded);
      els.projectName.value = state.project.name;
      activeFileId = state.activeFileId || null;
      activeFolderId = state.activeFolderId || null;
      selectedNodeId = activeFileId || activeFolderId;
      const file = activeFileId ? findFileById(activeFileId) : null;
      els.editor.value = file ? (file.content || "") : "";
      renderTree();
      updateEditorView();
      persistState();
    }

    function toggleSidebar(force) {
      const shouldOpen = typeof force === "boolean" ? force : els.sidebar.classList.contains("closed");
      els.sidebar.classList.toggle("closed", !shouldOpen);
      els.overlay.classList.toggle("show", shouldOpen && window.innerWidth <= 800);
    }

    function setProjectName() {
      state.project.name = els.projectName.value.trim() || "Untitled Project";
      persistState();
    }

    function getCurrentLineInfo(text, cursorPos) {
      const lineStart = text.lastIndexOf("\n", cursorPos - 1) + 1;
      const lineEnd = text.indexOf("\n", cursorPos);
      const end = lineEnd === -1 ? text.length : lineEnd;
      const lineText = text.slice(lineStart, end);
      const beforeCursor = text.slice(lineStart, cursorPos);
      return { lineStart, lineEnd: end, lineText, beforeCursor };
    }

    function lineOpensBlock(lineText) {
      const noLineComment = lineText.replace(/\/\/.*$/, "");
      const trimmed = noLineComment.trimEnd();
      return /\{\s*$/.test(trimmed);
    }

    function insertTextAtCursor(textToInsert, replaceLength = 0) {
      const editor = els.editor;
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const value = editor.value;

      editor.value = value.slice(0, start - replaceLength) + textToInsert + value.slice(end);
      const cursor = start - replaceLength + textToInsert.length;
      editor.selectionStart = editor.selectionEnd = cursor;
      updateEditorView();
      saveCurrentFile();
    }

    function handleEnterKey(e) {
      e.preventDefault();

      const editor = els.editor;
      const value = editor.value;
      const start = editor.selectionStart;
      const end = editor.selectionEnd;

      const { lineText } = getCurrentLineInfo(value, start);
      const leading = lineText.match(/^[ \t]*/)?.[0] || "";
      const extra = lineOpensBlock(lineText) ? " ".repeat(INDENT_SIZE) : "";
      const insertion = "\n" + leading + extra;

      if (start !== end) {
        editor.value = value.slice(0, start) + insertion + value.slice(end);
        editor.selectionStart = editor.selectionEnd = start + insertion.length;
      } else {
        editor.value = value.slice(0, start) + insertion + value.slice(end);
        editor.selectionStart = editor.selectionEnd = start + insertion.length;
      }

      updateEditorView();
      saveCurrentFile();
    }

    function handleCloseBraceKey(e) {
      const editor = els.editor;
      const value = editor.value;
      const start = editor.selectionStart;
      const end = editor.selectionEnd;

      if (start !== end) return;

      const { lineStart, beforeCursor } = getCurrentLineInfo(value, start);
      if (/^[ \t]*$/.test(beforeCursor)) {
        const currentIndent = beforeCursor.length;
        if (currentIndent >= INDENT_SIZE) {
          e.preventDefault();
          const removeFrom = start - INDENT_SIZE;
          editor.value = value.slice(0, removeFrom) + value.slice(end);
          const insertPos = removeFrom;
          editor.value = editor.value.slice(0, insertPos) + "}" + editor.value.slice(insertPos);
          editor.selectionStart = editor.selectionEnd = insertPos + 1;
          updateEditorView();
          saveCurrentFile();
          return;
        }
      }
    }

    // Event wiring
    els.menuBtn.addEventListener("click", () => {
      const open = els.sidebar.classList.contains("closed");
      toggleSidebar(open);
    });

    els.overlay.addEventListener("click", () => toggleSidebar(false));

    els.newFolderBtn.addEventListener("click", createFolder);
    els.newFileBtn.addEventListener("click", createFile);
    els.saveBtn.addEventListener("click", () => {
      saveCurrentFile();
      persistState();
    });
    els.loadBtn.addEventListener("click", loadProjectFromStorage);
    els.renameBtn.addEventListener("click", renameActiveFile);
    els.deleteBtn.addEventListener("click", deleteActiveFile);

    els.projectName.addEventListener("input", setProjectName);

    els.editor.addEventListener("input", () => {
      updateEditorView();
      saveCurrentFile();
    });

    els.editor.addEventListener("scroll", syncScroll);

    els.editor.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        const start = els.editor.selectionStart;
        const end = els.editor.selectionEnd;
        const value = els.editor.value;
        els.editor.value = value.substring(0, start) + "  " + value.substring(end);
        els.editor.selectionStart = els.editor.selectionEnd = start + 2;
        updateEditorView();
        saveCurrentFile();
        return;
      }

      if (e.key === "Enter") {
        handleEnterKey(e);
        return;
      }

      if (e.key === "}") {
        handleCloseBraceKey(e);
        return;
      }

      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
        e.preventDefault();
        saveCurrentFile();
      }
    });

    els.tree.addEventListener("click", (e) => {
      const row = e.target.closest(".tree-row");
      if (!row) return;

      const id = row.dataset.id;
      const action = row.dataset.action;

      if (action === "toggle-folder") {
        const folder = findFolderById(id);
        if (!folder) return;
        folder.open = !folder.open;
        selectedNodeId = id;
        activeFolderId = id;
        renderTree();
        persistState();
      }

      if (action === "open-file") {
        openFile(id);
        persistState();
      }
    });

    window.addEventListener("resize", () => {
      measureMetrics();
      renderBlockGuides();
      if (window.innerWidth > 800) {
        els.overlay.classList.remove("show");
        if (els.sidebar.classList.contains("closed")) {
          els.sidebar.classList.remove("closed");
        }
      }
    });

    // Initial render
    renderTree();
    measureMetrics();

    if (activeFileId) {
      const file = findFileById(activeFileId);
      if (file) els.editor.value = file.content || "";
    } else {
      const firstFile = findFileById(state.project.rootFolders[0]?.files?.[0]?.id);
      if (firstFile) {
        activeFileId = firstFile.id;
        els.editor.value = firstFile.content || "";
      }
    }

    updateEditorView();
    persistState();
    toggleSidebar(true);
  </script>
</body>
</html>
